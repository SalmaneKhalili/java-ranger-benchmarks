name: Java Ranger Benchmarks

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      jr_ref:
        description: 'Java Ranger ref (branch/commit)'
        required: false
        default: 'svcomp'
  repository_dispatch:
    types: [java-ranger-push]

env:
  JR_REPO: SalmaneKhalili/java-ranger
  SV_BENCH_REPO: https://gitlab.com/sosy-lab/benchmarking/sv-benchmarks.git
  JR_REF: svcomp

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list-suites.outputs.matrix }}
    steps:
      - name: Checkout benchmarks repo
        uses: actions/checkout@v4
      - id: list-suites
        run: echo "matrix=$(python3 scripts/ci.py list-suites)" >> "$GITHUB_OUTPUT"

  benchmarks:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout benchmarks repo
        uses: actions/checkout@v4
        with:
          path: benchmarks

      - name: Checkout java-ranger
        uses: actions/checkout@v4
        with:
          repository: ${{ env.JR_REPO }}
          token: ${{ secrets.BENCHMARK_PAT }}
          ref: ${{ github.event.client_payload.ref || env.JR_REF }}
          path: java-ranger
          submodules: recursive
          fetch-depth: 0

      - name: Unshallow submodules
        run: git -C java-ranger/jpf-core fetch --unshallow 2>/dev/null || true

      - name: Cache sv-benchmarks
        id: cache-sv-benchmarks
        uses: actions/cache@v4
        with:
          path: sv-benchmarks
          key: sv-benchmarks-v2

      - name: Checkout sv-benchmarks
        run: |
          if [ -d "sv-benchmarks/.git" ]; then
            cd sv-benchmarks
            git remote set-url origin ${{ env.SV_BENCH_REPO }}
            git fetch --depth=1 origin main
          else
            git clone --depth=1 --filter=tree:0 \
              ${{ env.SV_BENCH_REPO }} \
              "${{ github.workspace }}/sv-benchmarks"
            cd "${{ github.workspace }}/sv-benchmarks"
          fi
          git sparse-checkout set --cone java/
          git reset --hard origin/main

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            java-ranger/.gradle
            java-ranger/jpf-core/build
            java-ranger/jpf-symbc/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('java-ranger/**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build java-ranger
        working-directory: java-ranger
        run: ./gradlew :jpf-core:buildJars :jpf-symbc:buildJars -x test --no-daemon
        env:
          GRADLE_OPTS: -Xmx2g -Duser.country=US

      - name: Install table-generator
        run: pip install benchexec

      - name: Create output dir
        run: mkdir -p benchmarks/results/${{ matrix.suite }}

      - name: Run ${{ matrix.suite }} benchmarks
        id: run_benchmarks
        working-directory: benchmarks
        run: |
          python3 scripts/ci.py run \
            "${{ matrix.suite }}" \
            "${{ github.workspace }}/java-ranger" \
            "${{ github.workspace }}/sv-benchmarks" \
            "results/${{ matrix.suite }}"
        timeout-minutes: 180

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.suite }}-${{ github.run_id }}
          path: benchmarks/results/${{ matrix.suite }}/

      - name: Post summary
        working-directory: benchmarks
        run: |
          echo "### Results: ${{ matrix.suite }}" >> "$GITHUB_STEP_SUMMARY"
          cat "results/${{ matrix.suite }}/summary.txt" >> "$GITHUB_STEP_SUMMARY"

  report:
    needs: [benchmarks, setup]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout benchmarks repo
        uses: actions/checkout@v4
        with:
          path: benchmarks-repo

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Install deps
        run: pip install benchexec yaml

      - name: Generate merged report
        id: report
        run: |
          echo "# Java Ranger Benchmark Report" > report.md
          echo "" >> report.md
          echo "**Run:** ${{ github.run_id }}" >> report.md
          echo "**JR Ref:** ${{ github.event.client_payload.ref || env.JR_REF }}" >> report.md
          echo "**Date:** $(date -u)" >> report.md
          echo "" >> report.md

          xml_files=""
          for d in results-*/; do
            suite_name="${d#results-}"
            suite_name="${suite_name%%-${{ github.run_id }}*}"
            for f in "$d"/*.results.xml.bz2; do
              [ -f "$f" ] && xml_files="$xml_files $f"
            done
            if [ -f "$d/summary.txt" ]; then
              echo "### $suite_name" >> report.md
              echo '```' >> report.md
              cat "$d/summary.txt" >> report.md
              echo '```' >> report.md
              echo "" >> report.md
            fi
          done

          cat report.md >> "$GITHUB_STEP_SUMMARY"

          mkdir -p merged-results docs

          if [ -z "$xml_files" ]; then
            echo "No XML files found for merge"
            exit 0
          fi

          python3 benchmarks-repo/scripts/ci.py merge merged-results $xml_files

          python3 benchmarks-repo/scripts/ci.py analyze \
            --output merged-results/failure-analysis.html \
            --build-id ${{ github.sha }} \
            merged-results/all-suites.results.xml.bz2

          cp merged-results/all-suites.table.html docs/ 2>/dev/null || true
          cp merged-results/all-suites.table.csv docs/ 2>/dev/null || true
          cp merged-results/failure-analysis.html docs/ 2>/dev/null || true

          CACHE_TAGS='<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n<meta http-equiv="Pragma" content="no-cache">\n<meta http-equiv="Expires" content="0">\n'
          for d in results-*/; do
            suite_name="${d#results-}"
            suite_name="${suite_name%%-${{ github.run_id }}*}"
            for f in "$d"/*.results.html; do
              [ -f "$f" ] || continue
              mkdir -p "docs/suites/$suite_name"
              cp "$f" "docs/suites/$suite_name/index.html"
              python3 -c "import re; p = 'docs/suites/$suite_name/index.html'; c = open(p).read(); open(p, 'w').write(c.replace('<head>', '<head>\n${CACHE_TAGS}', 1))"
            done
          done

      - name: Regression check
        id: check
        continue-on-error: true
        run: |
          if [ -f config/baseline.json ]; then
            python3 benchmarks-repo/scripts/ci.py check merged-results/ --baseline config/baseline.json
          else
            echo "No baseline.json yet; skipping check"
          fi

      - name: Report regressions
        if: steps.check.outcome == 'failure'
        run: |
          echo "## REGRESSIONS DETECTED" >> "$GITHUB_STEP_SUMMARY"
          echo "Score dropped or new unknowns compared to baseline." >> "$GITHUB_STEP_SUMMARY"

      - name: Generate index page
        run: |
          GIT_SHA="${{ github.sha }}"
          CB="?v=${GIT_SHA}"
          SUITE_LIST=""
          for d in results-*/; do
            suite_name="${d#results-}"
            suite_name="${suite_name%%-${{ github.run_id }}*}"
            if [ -d "docs/suites/$suite_name" ]; then
              SUITE_LIST="${SUITE_LIST}  <li><a href=\"suites/${suite_name}/index.html${CB}\">${suite_name}</a></li>\n"
            fi
          done

          cat > docs/index.html << INDEXEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
          <meta http-equiv="Pragma" content="no-cache">
          <meta http-equiv="Expires" content="0">
          <title>Java Ranger Benchmarks</title>
          <style>
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f5f5f5; color: #333; }
          .header { background: #2c3e50; color: white; padding: 30px 40px; }
          .header h1 { margin: 0; font-size: 1.8em; }
          .header p { margin: 6px 0 0; opacity: 0.8; font-size: 0.9em; }
          .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
          h2 { font-size: 1.1em; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 6px; margin: 24px 0 12px; }
          ul { list-style: none; padding: 0; margin: 0; }
          li { margin: 0; }
          li a { display: block; padding: 8px 12px; color: #3498db; text-decoration: none; border-radius: 4px; font-size: 0.95em; }
          li a:hover { background: #e8f0fe; }
          .footer { text-align: center; padding: 30px; color: #999; font-size: 0.85em; }
          </style>
          </head>
          <body>
          <div class="header">
            <h1>Java Ranger Benchmarks</h1>
            <p>Daily SV-COMP benchmark results tracking</p>
          </div>
          <div class="container">
            <h2>Merged Results</h2>
            <ul>
              <li><a href="all-suites.table.html${CB}">All Suites (table-generator)</a></li>
            </ul>
            <h2>Per-Suite Tables</h2>
            <ul>
            ${SUITE_LIST}
            </ul>
            <h2>Analysis</h2>
            <ul>
              <li><a href="failure-analysis.html${CB}">Failure Analysis</a></li>
              <li><a href="all-suites.table.csv${CB}">Raw Data (CSV)</a></li>
            </ul>
          </div>
          <div class="footer">
            Generated by java-ranger-benchmarks CI &mdash; Run ${{ github.run_id }}
          </div>
          </body>
          </html>
          INDEXEOF

      - name: Commit results and docs
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" repo
          cd repo
          git config user.name "java-ranger-benchmarks CI"
          git config user.email "actions@github.com"

          for d in "${{ github.workspace }}"/results-*/; do
            [ -d "$d" ] || continue
            suite_name="${d#results-}"
            suite_name="${suite_name%%-${{ github.run_id }}*}"
            mkdir -p "results/$suite_name"
            cp -r "$d"* "results/$suite_name/"
          done

          if [ -d "${{ github.workspace }}/docs" ]; then
            mkdir -p docs
            cp -r "${{ github.workspace }}/docs/"* docs/
          fi

          if [ -n "$(git status --porcelain results/ docs/ )" ]; then
            git add results/ docs/
            git commit -m "benchmark: results for run ${{ github.run_id }}

          Trigger: ${{ github.event_name }}
          JR Ref: ${{ github.event.client_payload.ref || env.JR_REF }}
          JR SHA: ${{ github.event.client_payload.sha || 'manual' }}"
            git push
            echo "Results committed and pushed."
          else
            echo "No changes to commit."
          fi
